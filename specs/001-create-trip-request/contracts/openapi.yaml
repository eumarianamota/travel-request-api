openapi: 3.1.0
info:
  title: Travel Request API - Create Flow
  version: 1.0.0
  description: Contract for creating institutional travel requests.
servers:
  - url: http://localhost:3030
paths:
  /trip-requests:
    post:
      summary: Create a travel request
      operationId: createTripRequest
      tags:
        - Trip Requests
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTripRequestInput'
            examples:
              default:
                value:
                  requesterName: Maria
                  origin: Teresina
                  destination: Fortaleza
                  departureAt: 2026-12-24T10:30:00-03:00
                  returnAt: 2026-12-26T08:00:00-03:00
                  purpose: Meeting
                  passengerCount: 2
      responses:
        '201':
          description: Travel request created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripRequestSuccessResponse'
              examples:
                default:
                  value:
                    success: true
                    data:
                      id: 1
                      requesterName: Maria
                      origin: Teresina
                      destination: Fortaleza
                      departureAt: 2026-12-24T13:30:00.000Z
                      returnAt: 2026-12-26T11:00:00.000Z
                      purpose: Meeting
                      passengerCount: 2
                      status: pending
                      createdAt: 2026-06-27T12:00:00.000Z
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                blank-purpose:
                  value:
                    success: false
                    error:
                      code: VALIDATION_ERROR
                      message: purpose must not be blank.
        '409':
          description: Travel request blocked by holiday rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HolidayTripNotAllowedErrorResponse'
              examples:
                holiday-block:
                  value:
                    success: false
                    error:
                      code: HOLIDAY_TRIP_NOT_ALLOWED
                      message: Travel is not allowed on holiday 2026-12-25.
        '502':
          description: Required holiday provider unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HolidaysApiUnavailableErrorResponse'
              examples:
                provider-down:
                  value:
                    success: false
                    error:
                      code: HOLIDAYS_API_UNAVAILABLE
                      message: Required holiday validation is currently unavailable.
        '500':
          description: Unexpected internal failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
              examples:
                unexpected:
                  value:
                    success: false
                    error:
                      code: INTERNAL_SERVER_ERROR
                      message: An unexpected internal error occurred.
components:
  schemas:
    CreateTripRequestInput:
      type: object
      additionalProperties: false
      required:
        - requesterName
        - origin
        - destination
        - departureAt
        - returnAt
        - purpose
        - passengerCount
      properties:
        requesterName:
          type: string
        origin:
          type: string
        destination:
          type: string
        departureAt:
          type: string
          format: date-time
        returnAt:
          type: string
          format: date-time
        purpose:
          type: string
        passengerCount:
          type: integer
          minimum: 1
    TripRequest:
      type: object
      required:
        - id
        - requesterName
        - origin
        - destination
        - departureAt
        - returnAt
        - purpose
        - passengerCount
        - status
        - createdAt
      properties:
        id:
          type: integer
        requesterName:
          type: string
        origin:
          type: string
        destination:
          type: string
        departureAt:
          type: string
          format: date-time
        returnAt:
          type: string
          format: date-time
        purpose:
          type: string
        passengerCount:
          type: integer
        status:
          type: string
          enum:
            - pending
            - canceled
        createdAt:
          type: string
          format: date-time
    TripRequestSuccessResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: '#/components/schemas/TripRequest'
    ErrorDetail:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          const: false
        error:
          $ref: '#/components/schemas/ErrorDetail'
    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            error:
              allOf:
                - $ref: '#/components/schemas/ErrorDetail'
                - type: object
                  properties:
                    code:
                      const: VALIDATION_ERROR
    HolidayTripNotAllowedErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            error:
              allOf:
                - $ref: '#/components/schemas/ErrorDetail'
                - type: object
                  properties:
                    code:
                      const: HOLIDAY_TRIP_NOT_ALLOWED
    HolidaysApiUnavailableErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            error:
              allOf:
                - $ref: '#/components/schemas/ErrorDetail'
                - type: object
                  properties:
                    code:
                      const: HOLIDAYS_API_UNAVAILABLE
    InternalServerErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            error:
              allOf:
                - $ref: '#/components/schemas/ErrorDetail'
                - type: object
                  properties:
                    code:
                      const: INTERNAL_SERVER_ERROR
