openapi: 3.1.0
info:
  title: Travel Request API - Get By Id Flow
  version: 1.0.0
  description: Contract for retrieving a travel request by identifier.
servers:
  - url: http://localhost:3030
paths:
  /trip-requests/{id}:
    get:
      summary: Get a travel request by identifier
      operationId: getTripRequestById
      tags:
        - Trip Requests
      parameters:
        - name: id
          in: path
          required: true
          description: Positive integer identifier. Leading-zero positive values such as `001` are accepted and normalized to the same numeric id.
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Travel request retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripRequestSuccessResponse'
              examples:
                default:
                  value:
                    success: true
                    data:
                      id: 1
                      requesterName: Maria Silva
                      origin: Parnaiba
                      destination: Teresina
                      departureAt: 2026-06-24T10:00:00.000Z
                      returnAt: 2026-06-24T18:00:00.000Z
                      purpose: Participation in an institutional meeting
                      passengerCount: 3
                      status: pending
                      createdAt: 2026-06-20T14:30:00.000Z
        '400':
          description: Invalid identifier input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                invalid-id:
                  value:
                    success: false
                    error:
                      code: VALIDATION_ERROR
                      message: id must be a positive integer.
        '404':
          description: Travel request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripRequestNotFoundErrorResponse'
              examples:
                not-found:
                  value:
                    success: false
                    error:
                      code: TRIP_REQUEST_NOT_FOUND
                      message: Travel request not found.
        '500':
          description: Unexpected internal failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
              examples:
                unexpected:
                  value:
                    success: false
                    error:
                      code: INTERNAL_SERVER_ERROR
                      message: An unexpected internal error occurred.
components:
  schemas:
    TripRequest:
      type: object
      required:
        - id
        - requesterName
        - origin
        - destination
        - departureAt
        - returnAt
        - purpose
        - passengerCount
        - status
        - createdAt
      properties:
        id:
          type: integer
        requesterName:
          type: string
        origin:
          type: string
        destination:
          type: string
        departureAt:
          type: string
          format: date-time
        returnAt:
          type: string
          format: date-time
        purpose:
          type: string
        passengerCount:
          type: integer
        status:
          type: string
          enum:
            - pending
            - canceled
        createdAt:
          type: string
          format: date-time
    TripRequestSuccessResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: '#/components/schemas/TripRequest'
    ErrorDetail:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          const: false
        error:
          $ref: '#/components/schemas/ErrorDetail'
    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            error:
              allOf:
                - $ref: '#/components/schemas/ErrorDetail'
                - type: object
                  properties:
                    code:
                      const: VALIDATION_ERROR
    TripRequestNotFoundErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            error:
              allOf:
                - $ref: '#/components/schemas/ErrorDetail'
                - type: object
                  properties:
                    code:
                      const: TRIP_REQUEST_NOT_FOUND
    InternalServerErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            error:
              allOf:
                - $ref: '#/components/schemas/ErrorDetail'
                - type: object
                  properties:
                    code:
                      const: INTERNAL_SERVER_ERROR
